# Selenium Grid 4 — parallel browser testing for AI Career Launchpad
# Start: docker compose -f docker-compose.grid.yml up -d
# Stop:  docker compose -f docker-compose.grid.yml down

services:
  selenium-hub:
    image: selenium/hub:4.27.0
    container_name: acl-selenium-hub
    ports:
      - "4444:4444"
      - "4442:4442"
      - "4443:4443"
    environment:
      - SE_NODE_MAX_SESSIONS=5
      - SE_SESSION_REQUEST_TIMEOUT=300
    networks:
      - selenium-grid

  chrome:
    image: selenium/node-chrome:4.27.0
    container_name: acl-selenium-chrome
    depends_on:
      - selenium-hub
    shm_size: 2gb
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
    networks:
      - selenium-grid

  firefox:
    image: selenium/node-firefox:4.27.0
    container_name: acl-selenium-firefox
    depends_on:
      - selenium-hub
    shm_size: 2gb
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
    networks:
      - selenium-grid

networks:
  selenium-grid:
    driver: bridge
